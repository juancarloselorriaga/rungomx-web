# RunGoMX Workflow: Event Publish Readiness
name: event-publish-readiness
description: "Validate event publication readiness with repo quality gates and compliance checks."
author: "RunGoMX"

# Critical variables from BMM config
config_source: "{project-root}/_bmad/bmm/config.yaml"
output_folder: "{config_source}:output_folder"
implementation_artifacts: "{config_source}:implementation_artifacts"
planning_artifacts: "{config_source}:planning_artifacts"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
document_output_language: "{config_source}:document_output_language"
date: system-generated

# Workflow components
installed_path: "{project-root}/bmad-modules/rungomx-bmm-extension/workflows/event-publish-readiness"
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"
template: false

# Variables and outputs
variables:
  event_identifier: ""
  readiness_dir: "{output_folder}/event-publish-readiness"
  readiness_report: "{output_folder}/event-publish-readiness/event-publish-readiness-report.md"

default_output_file: "{output_folder}/event-publish-readiness/event-publish-readiness-report.md"

required_tools:
  - read_file
  - write_file
  - create_directory
  - run_command
  - search_repo

tags:
  - rungomx
  - event
  - publish
  - readiness

execution_hints:
  interactive: true
  autonomous: false
  iterative: true

standalone: true
