# RunGoMX Workflow: Release Readiness
name: release-readiness
description: "Run RunGoMX release quality gates and produce a go/no-go report."
author: "RunGoMX"

# Critical variables from BMM config
config_source: "{project-root}/_bmad/bmm/config.yaml"
output_folder: "{config_source}:output_folder"
implementation_artifacts: "{config_source}:implementation_artifacts"
planning_artifacts: "{config_source}:planning_artifacts"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
document_output_language: "{config_source}:document_output_language"
date: system-generated

# Workflow components
installed_path: "{project-root}/bmad-modules/rungomx-bmm-extension/workflows/release-readiness"
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"
template: false

# Variables and outputs
variables:
  readiness_dir: "{output_folder}/release-readiness"
  readiness_report: "{output_folder}/release-readiness/release-readiness-report.md"

default_output_file: "{output_folder}/release-readiness/release-readiness-report.md"

required_tools:
  - read_file
  - write_file
  - create_directory
  - run_command

tags:
  - rungomx
  - release
  - readiness
  - quality-gates

execution_hints:
  interactive: true
  autonomous: false
  iterative: true

standalone: true
