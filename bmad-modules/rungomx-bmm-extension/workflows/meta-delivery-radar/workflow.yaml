# RunGoMX Workflow: Meta Delivery Radar
name: meta-delivery-radar
description: "Generate a delivery health radar and orchestrate agent-team follow-up lanes."
author: "RunGoMX"

# Critical variables from BMM config
config_source: "{project-root}/_bmad/bmm/config.yaml"
output_folder: "{config_source}:output_folder"
implementation_artifacts: "{config_source}:implementation_artifacts"
planning_artifacts: "{config_source}:planning_artifacts"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
document_output_language: "{config_source}:document_output_language"
date: system-generated

# Workflow components
installed_path: "{project-root}/bmad-modules/rungomx-bmm-extension/workflows/meta-delivery-radar"
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"
template: false

# Variables and outputs
variables:
  project_root: "{project-root}"
  out_dir: "{implementation_artifacts}/meta"
  strict_mode: false
  generator_script: "{project-root}/bmad-modules/rungomx-bmm-extension/tools/generate-delivery-radar.mjs"
  radar_json: "{implementation_artifacts}/meta/delivery-radar.json"
  radar_md: "{implementation_artifacts}/meta/delivery-radar.md"

default_output_file: "{implementation_artifacts}/meta/delivery-radar.md"

required_tools:
  - read_file
  - write_file
  - create_directory
  - run_command
  - search_repo

tags:
  - rungomx
  - meta
  - delivery
  - radar
  - operations

execution_hints:
  interactive: true
  autonomous: false
  iterative: true

standalone: true
